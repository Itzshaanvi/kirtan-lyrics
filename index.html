<!DOCTYPE html>
<html>
<head>
  <title>Kirtan Lyrics Library</title>
  <style>
    body { font-family: sans-serif; background: #f0f0f0; padding: 20px; }
    .song { background: rgba(255,255,255,0.5); backdrop-filter: blur(10px); padding: 15px; margin-bottom: 10px; border-radius: 12px; }
    .lyrics { display: none; margin-top: 10px; white-space: pre-wrap; }
    button { margin-top: 5px; }
  </style>
</head>
<body>
  <h1>Kirtan Lyrics Library</h1>
  <div id="lyrics-container"></div>

  <script>
    const rawUrl = 'https://raw.githubusercontent.com/YOUR_USERNAME/kirtan-lyrics/main/lyrics.json';

    fetch(rawUrl)
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('lyrics-container');
        data.forEach(song => {
          const div = document.createElement('div');
          div.className = 'song';
          div.innerHTML = `
            <h2>${song.title} - ${song.artist}</h2>
            <button>Show/Hide Lyrics</button>
            <div class="lyrics">${song.lyrics}</div>
          `;
          const btn = div.querySelector('button');
          const lyricsDiv = div.querySelector('.lyrics');
          btn.onclick = () => {
            lyricsDiv.style.display = lyricsDiv.style.display === 'none' ? 'block' : 'none';
          }
          container.appendChild(div);
        });
      })
      .catch(err => console.error('Error loading lyrics:', err));
  </script>
</body>
</html>
