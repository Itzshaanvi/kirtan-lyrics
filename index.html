<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kirtan Library</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      padding: 20px;
    }
    .kirtan-box {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .kirtan-title {
      font-weight: bold;
      font-size: 1.2em;
      margin-bottom: 10px;
    }
    .lyrics {
      white-space: pre-wrap;
      display: none;
      margin-top: 10px;
    }
    .btn {
      margin-top: 10px;
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #4CAF50;
      color: white;
    }
  </style>
</head>
<body>

  <h1>Kirtan Library</h1>
  <div id="kirtan-container"></div>

  <script>
    // Replace this URL with your raw GitHub JSON URL
    const jsonURL = "https://raw.githubusercontent.com/itzshaanvi/kirtan-lyrics/main/lyrics.json";
    fetch(jsonURL)
      .then(response => response.json())
      .then(data => {
        const container = document.getElementById("kirtan-container");

        data.forEach(kirtan => {
          const box = document.createElement("div");
          box.className = "kirtan-box";

          const title = document.createElement("div");
          title.className = "kirtan-title";
          title.textContent = kirtan.title + " — " + kirtan.artist;

          const lyrics = document.createElement("div");
          lyrics.className = "lyrics";
          lyrics.textContent = kirtan.lyrics;

          const btn = document.createElement("button");
          btn.className = "btn";
          btn.textContent = "Show Lyrics";
          btn.onclick = () => {
            if (lyrics.style.display === "none") {
              lyrics.style.display = "block";
              btn.textContent = "Hide Lyrics";
            } else {
              lyrics.style.display = "none";
              btn.textContent = "Show Lyrics";
            }
          };

          box.appendChild(title);
          box.appendChild(btn);
          box.appendChild(lyrics);
          container.appendChild(box);
        });
      })
      .catch(err => console.error("Failed to load kirtans:", err));
  </script>
</body>
</html>
